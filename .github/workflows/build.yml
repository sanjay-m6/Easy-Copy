name: Build EasyRoboCopy EXE

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install PS2EXE Module
      shell: powershell
      run: |
        Set-PSRepository PSGallery -InstallationPolicy Trusted
        Install-Module PS2EXE -Scope CurrentUser -Force -AcceptLicense

    - name: Compile to Executable
      shell: powershell
      run: |
        Invoke-PS2EXE -InputFile "RoboCopyGUI_1.0.ps1" -OutputFile "EasyRoboV1.exe" -NoConsole -STA -IconFile "EasyRoboCopy.ico" -Title "EasyRoboCopy V1" -Description "RoboCopy GUI Tool by sanjay-m6"

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EasyRoboV1
        path: EasyRoboV1.exe
        
    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: EasyRoboV1.exe
        name: EasyRoboCopy ${{ github.ref_name }}
        generate_release_notes: true
